  <path d="M26 24V42" stroke="#3a3a48" stroke-width="1"/>
  <path d="M32 24V42" stroke="#3a3a48" stroke-width="1"/>
  <path d="M38 24V42" stroke="#3a3a48" stroke-width="1"/>
  <path d="M44 24V42" stroke="#3a3a48" stroke-width="1"/>

